<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ if .IsHome }}{{ site.Params.description }}{{ else }}{{ .Description }}{{ end }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital@0;1&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.13.2/pixi.min.js" integrity="sha512-rOMqai9NIPaFWpmvHUjdOa2dSuaaYo6i7E19jS1ZW9rjnrl4qAOOtsOeTk0QgIflFCe2ZYi/7or3CRF6VfBk9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
   
    <!-- Restore theme before CSS paints to prevent flash -->
    <script>
      function setTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
      }
      setTheme(localStorage.getItem('theme') || 'light');
    </script>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <!-- kbar mounts itself into this portal root -->
    <div id="kbar-root"></div>

    <nav>
        <a href="{{ "/" | relURL }}" class="home-link">◢ {{ site.Title }} ◣</a>
        <a href="{{ "/tutorial" | relURL }}">Tutorials</a>
        <button class="kbd">Cmd+k</button>
        <div class="theme-switcher" role="group" aria-label="Theme">
            <button class="theme-btn" data-theme="light" onclick="setTheme('light')">Light</button>
            <button class="theme-btn" data-theme="dark"  onclick="setTheme('dark')">Dark</button>
            <button class="theme-btn" data-theme="retro" onclick="setTheme('retro')">Retro</button>
        </div>
    </nav>
    <main class="content">
        {{ block "main" . }}{{ end }}
    </main>
    <div class="tech-footer">
        ◢ {{ site.Title }} ◣ - {{ site.Params.description }}
    </div>

    <!-- React islands bundle — deferred, non-blocking -->
    <script type="module" src="/js/islands.js" defer></script>
</body>
</html>
