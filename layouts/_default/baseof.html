<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ if .IsHome }}{{ site.Params.description }}{{ else }}{{ .Description }}{{ end }}">

    <link rel="stylesheet" href="https://use.typekit.net/lnv0pdg.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.13.2/pixi.min.js" integrity="sha512-rOMqai9NIPaFWpmvHUjdOa2dSuaaYo6i7E19jS1ZW9rjnrl4qAOOtsOeTk0QgIflFCe2ZYi/7or3CRF6VfBk9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <!-- Restore theme + colour before CSS paints to prevent flash -->
    <script>
      function setTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
      }
      function setPrimary(p) {
        document.documentElement.setAttribute('data-primary', p);
        localStorage.setItem('primary', p);
      }
      setTheme(localStorage.getItem('theme') || 'light');
      setPrimary(localStorage.getItem('primary') || 'purple');
    </script>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <!-- kbar mounts itself into this portal root -->
    <div id="kbar-root"></div>

    <nav>
        <a href="{{ "/" | relURL }}" class="home-link">◢ {{ site.Title }} ◣</a>
        <a href="{{ "/tutorial" | relURL }}">Tutorials</a>
        <a href="{{ "/articles" | relURL }}">Articles</a>
        <button class="kbd">Cmd+k</button>
        <div class="theme-switcher" role="group" aria-label="Theme">
            <button class="theme-btn" data-theme="light" onclick="setTheme('light')" aria-label="Light mode"><i class="ph-bold ph-sun-dim"></i></button>
            <button class="theme-btn" data-theme="dark"  onclick="setTheme('dark')"  aria-label="Dark mode"><i class="ph-bold ph-moon"></i></button>
        </div>
    </nav>
    <main class="content">
        {{ block "main" . }}{{ end }}
    </main>
    <div class="tech-footer">
        ◢ {{ site.Title }} ◣ - {{ site.Params.description }}
        &nbsp;·&nbsp;
        Spawned by <a href="https://alexishope.dev" target="_blank" rel="noopener">Alexis Hope</a> on Layer 0
    </div>

    <!-- Phosphor Icons web components -->
    <script type="module" src="https://esm.sh/@phosphor-icons/web@2.1.1"></script>

    <!-- React islands bundle — deferred, non-blocking -->
    <script type="module" src="/js/islands.js" defer></script>
</body>
</html>
