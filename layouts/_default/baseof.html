<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ if .IsHome }}{{ site.Params.description }}{{ else }}{{ .Description }}{{ end }}">
    <style>
        body {
            font-family: 'Monaco', 'Consolas', 'Courier New', monospace;
            line-height: 1.6;
            color: #00ff00;
            background-color: #0a0a0a;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { 
            color: #00ff41; 
            font-weight: bold; 
            font-size: 2.2em; 
            text-shadow: 0 0 10px #00ff41;
            margin-bottom: 0.5em;
        }
        h2 { 
            color: #00e635; 
            border-bottom: 2px solid #00ff41; 
            padding-bottom: 10px; 
            margin-top: 1.5em;
            text-shadow: 0 0 5px #00e635;
        }
        h3 { color: #39ff14; margin-top: 1.2em; }
        .post-meta { 
            color: #888; 
            font-size: 0.9em; 
            margin-bottom: 20px; 
            border-left: 3px solid #00ff41;
            padding-left: 12px;
            background: rgba(0, 255, 65, 0.1);
        }
        .post-list { list-style: none; padding: 0; }
        .post-list li { 
            margin-bottom: 25px; 
            padding: 20px; 
            border: 1px solid #00ff41; 
            border-radius: 8px; 
            background: rgba(0, 255, 65, 0.05); 
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }
        .post-list a { 
            text-decoration: none; 
            color: #00ff41; 
            font-weight: bold; 
            font-size: 1.1em;
            text-shadow: 0 0 3px #00ff41;
        }
        .post-list a:hover { 
            color: #39ff14; 
            text-shadow: 0 0 8px #39ff14;
        }
        nav { 
            margin-bottom: 30px; 
            border-bottom: 2px solid #00ff41; 
            padding-bottom: 15px;
            background: rgba(0, 255, 65, 0.1);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }
        nav a { 
            margin-right: 20px; 
            text-decoration: none; 
            color: #00ff41; 
            font-weight: bold;
            text-shadow: 0 0 3px #00ff41;
        }
        nav a:hover { 
            color: #39ff14; 
            text-shadow: 0 0 8px #39ff14;
        }
        .home-link { 
            font-size: 1.3em; 
            font-weight: bold; 
            color: #00ff41 !important; 
            text-shadow: 0 0 10px #00ff41 !important;
        }
        .content { 
            background: rgba(0, 255, 65, 0.05); 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #00ff41;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2);
        }
        .tech-footer {
            margin-top: 2em;
            padding-top: 1em;
            border-top: 1px solid #00ff41;
            font-size: 0.9em;
            color: #888;
            text-align: center;
        }
        a { color: #00ff41; }
        a:hover { color: #39ff14; }
        p { color: #ccc; }
    </style>
</head>
<body>
    <nav>
        <a href="{{ "/" | relURL }}" class="home-link">◢ {{ site.Title }} ◣</a>
        <a href="{{ "/tutorials" | relURL }}">Tutorials</a>
        <a href="{{ "/techniques" | relURL }}">Techniques</a>
        <a href="{{ "/demos" | relURL }}">Demos</a>
    </nav>
    <main class="content">
        {{ block "main" . }}{{ end }}
    </main>
    <div class="tech-footer">
        ◢ {{ site.Title }} ◣ - {{ site.Params.description }}
    </div>
</body>
</html>
