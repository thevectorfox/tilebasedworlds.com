<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ if .IsHome }}{{ site.Params.description }}{{ else }}{{ .Description }}{{ end }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.13.2/pixi.min.js" integrity="sha512-rOMqai9NIPaFWpmvHUjdOa2dSuaaYo6i7E19jS1ZW9rjnrl4qAOOtsOeTk0QgIflFCe2ZYi/7or3CRF6VfBk9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <!-- kbar mounts itself into this portal root -->
    <div id="kbar-root"></div>

    <nav>
        <a href="{{ "/" | relURL }}" class="home-link">◢ {{ site.Title }} ◣</a>
        <a href="{{ "/tutorial" | relURL }}">Tutorials</a>
    </nav>
    <main class="content">
        {{ block "main" . }}{{ end }}
    </main>
    <div class="tech-footer">
        ◢ {{ site.Title }} ◣ - {{ site.Params.description }}
    </div>

    <!-- React islands bundle — deferred, non-blocking -->
    <script type="module" src="/js/islands.js" defer></script>
</body>
</html>
